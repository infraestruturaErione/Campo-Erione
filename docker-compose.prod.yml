services:
  db:
    image: mariadb:11.8
    container_name: erione-field-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-appcampo}
      MARIADB_USER: ${DB_USER:-appcampo}
      MARIADB_PASSWORD: ${DB_PASSWORD:-change-this-password}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-this-root-password}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u${DB_USER:-appcampo} -p${DB_PASSWORD:-change-this-password} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: erione-field-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AUTH_API_PORT: 3001
      AUTH_API_HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      APP_BASE_URL: ${APP_BASE_URL:-https://field.erione.com}
      AUTH_ALLOWED_ORIGINS: ${AUTH_ALLOWED_ORIGINS:-https://field.erione.com}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-appcampo_sid}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_RATE_LIMIT_MAX_ATTEMPTS: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:-8}
      DB_SSLMODE: disable
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: erione-field-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
