services:
  db:
    image: postgres:16-alpine
    container_name: erione-field-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: appcampo
      POSTGRES_USER: ${POSTGRES_USER:-appcampo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appcampo} -d ${POSTGRES_DB:-appcampo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: erione-field-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      AUTH_API_PORT: 3001
      AUTH_API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-appcampo}:${POSTGRES_PASSWORD:-change-this-password}@db:5432/${POSTGRES_DB:-appcampo}
      APP_BASE_URL: ${APP_BASE_URL:-https://field.erione.com}
      AUTH_ALLOWED_ORIGINS: ${AUTH_ALLOWED_ORIGINS:-https://field.erione.com}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-appcampo_sid}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_RATE_LIMIT_MAX_ATTEMPTS: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:-8}
      PG_SSLMODE: disable
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: erione-field-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
